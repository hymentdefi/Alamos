<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="512" height="512">
  <rect width="100" height="100" rx="19" fill="#FAFAF7"></rect>
  <defs>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feFlood flood-color="#00E676" flood-opacity="0.55"></feFlood>
      <feComposite in2="blur" operator="in"></feComposite>
    </filter>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"></feGaussianBlur>
      <feOffset dx="0" dy="1.4"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <polygon points="38,26 16,86 60,86" fill="#00E676" filter="url(#halo)" opacity="0.9"></polygon>
  <polygon points="38,26 16,86 60,86" fill="#00E676"></polygon>
  <polygon points="56,12 29,86 83,86" fill="#0E0F0C" filter="url(#sh)"></polygon>
</svg>